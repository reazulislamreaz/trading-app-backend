name: Deploy to VPS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint || true

      - name: Run type check
        run: npm run typecheck

      - name: Run tests
        run: npm test || true
        env:
          DB_URL: mongodb://localhost:27017/test_db
          ACCESS_TOKEN: test_access_token_secret_key_min_32_chars_long_for_testing
          REFRESH_TOKEN: test_refresh_token_secret_key_min_32_chars_long_for_testing
          RESET_SECRET: test_reset_secret_token_key_min_32_chars_long_for_testing
          VERIFIED_TOKEN: test_verified_token_key_min_32_chars_long_for_testing

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t myapp:${{ github.sha }} .

      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            # Navigate to app directory
            cd /opt/myapp

            # Pull latest changes
            git pull origin main

            # Stop existing containers
            docker-compose down

            # Remove old images
            docker rmi myapp:latest || true

            # Build new image
            docker build -t myapp:latest .

            # Start containers
            docker-compose up -d

            # Clean up old images
            docker image prune -f

            # Show logs
            docker-compose logs -f
